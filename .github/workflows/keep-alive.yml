name: Keep HF Space Alive

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set timezone to Asia/Shanghai
        uses: szenius/set-timezone@v1.2
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: 🌐 访问 Hugging Face Space
        run: |
          echo "🕒 当前北京时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "🔄 正在 ping: https://keawqe-ac.hf.space/"
          
          curl -I -L -m 30 \
               -A "Mozilla/5.0 (compatible; GitHub-KeepAlive)" \
               https://keawqe-ac.hf.space/ || true
          
          echo "✅ 访问完成"
