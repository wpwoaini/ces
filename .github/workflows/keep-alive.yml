name: Keep HF Space Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: 🌐 Keep Space Alive
        run: |
          echo "🕒 时间: $(date -u +'%Y-%m-%d %H:%M:%S' -d '+8 hours')"
          echo "🔗 访问: https://keawqe-ac.hf.space/"
          curl -I -L -m 30 -A "Mozilla/5.0 (compatible; GitHub-KeepAlive)" https://keawqe-ac.hf.space/ || true
          echo "✅ 执行完成"
