name: Keep HF Space Alive

on:
  schedule:
    - cron: '0 21 * * *' # UTC21:00 = 北京时间次日05:00
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 替换老旧 set-timezone Action，原生设置时区，无Node版本警告
      - name: Set Asia/Shanghai Timezone
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          echo "TZ=Asia/Shanghai" >> $GITHUB_ENV

      - name: 🌐 访问 Hugging Face Space
        run: |
          echo "🕒 当前北京时间: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "🔄 正在 ping: https://keawqe-ac.hf.space/"
          
          curl -I -L -m 30 \
               -A "Mozilla/5.0 (compatible; GitHub-KeepAlive)" \
               https://keawqe-ac.hf.space/ || true
          
          echo "✅ 访问完成"
