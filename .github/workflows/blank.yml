name: Keep HF Space Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space
        run: |
          echo "🕒 北京时间: $(date -u +'%Y-%m-%d %H:%M:%S' -d '+8 hours')"
          echo "🔗 正在访问 https://keawqe-ac.hf.space/"
          curl -I -L -m 25 -A "GitHub-KeepAlive" https://keawqe-ac.hf.space/ || true
          echo "✅ 本次执行完成"
